description: "Neither do people light a lamp and put it under a bowl. Instead they put it on its stand, and it gives light to everyone in the house."
keyword: "GSH, Sihan Blog, gaosihan, sihangao"
url: "http://sihan0229.github.io"          # your host, for absolute URL
baseurl: ""      # for example, '/blog' if your blog hosted on 'host/blog'
